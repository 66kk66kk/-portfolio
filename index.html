<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIM SUNG HO | 3D & Motion Technical Artist</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:ital,wght@0,100..900;1,100..900&family=Pretendard:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.34/dist/lenis.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <!-- 3D 모델 뷰어를 위한 구글 model-viewer 스크립트 -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Pretendard', 'sans-serif'], urbanist: ['Urbanist', 'sans-serif'] },
                    colors: { brand: { neon: '#deff9a', dark: '#050505', card: '#0a0a0a', border: '#1a1a1a' } }
                }
            }
        }
    </script>

    <style>
        body { background-color: #050505; color: #f5f5f5; cursor: default; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }

        /* Custom Scrollbar for Facial Panel */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; display: block; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #deff9a; border-radius: 10px; }

        /* Facial Slider Styling */
        .facial-slider { -webkit-appearance: none; width: 100%; height: 4px; background: #222; border-radius: 2px; outline: none; }
        .facial-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 14px; height: 14px;
            background: #deff9a; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px rgba(222, 255, 154, 0.4); border: 2px solid #000;
        }

        #cursor-dot { position: fixed; top: 0; left: 0; width: 8px; height: 8px; background-color: #deff9a; border-radius: 50%; transform: translate(-50%, -50%); z-index: 9999; pointer-events: none; }
        #cursor-outline { position: fixed; top: 0; left: 0; width: 40px; height: 40px; border: 1px solid rgba(222, 255, 154, 0.4); border-radius: 50%; transform: translate(-50%, -50%); z-index: 9998; pointer-events: none; transition: width 0.4s cubic-bezier(0.23, 1, 0.32, 1), height 0.4s cubic-bezier(0.23, 1, 0.32, 1); }
        @media (pointer: coarse) { #cursor-dot, #cursor-outline { display: none !important; } }

        .reveal-mask { overflow: hidden; display: block; }
        .reveal-text { display: block; transform: translateY(110%); }
        .video-wrapper { position: relative; overflow: hidden; border-radius: 20px; border: 1px solid #1a1a1a; background: #0a0a0a; aspect-ratio: 16/9; cursor: pointer; }
        .tag { padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid rgba(255,255,255,0.1); }
        .text-gradient { background: linear-gradient(135deg, #deff9a 0%, #a7f3d0 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .scroll-progress { position: fixed; top: 0; left: 0; width: 0%; height: 3px; background: #deff9a; z-index: 100; }
    </style>
</head>
<body class="antialiased" oncontextmenu="return false;">

    <div class="scroll-progress" id="progress-bar"></div>
    <div id="cursor-dot"></div>
    <div id="cursor-outline"></div>

    <nav class="fixed top-0 w-full z-40 px-6 py-8 flex justify-between items-center mix-blend-difference">
        <div class="font-urbanist font-black text-2xl tracking-tighter">KSH<span class="text-brand-neon">.</span></div>
    </nav>

    <!-- 3D Viewer Section -->
    <section class="py-20 px-6 relative z-10" id="3d-viewer">
        <div class="max-w-7xl mx-auto">
            <div class="text-center mb-8">
                <span class="text-brand-neon font-black tracking-[0.3em] text-xs uppercase border border-brand-neon/30 px-4 py-2 rounded-full">Interactive Technical Showcase</span>
            </div>
            
            <div class="w-full h-[700px] md:h-[850px] rounded-[2rem] border border-brand-border bg-[#080808] relative overflow-hidden shadow-2xl">
                
                <!-- TA Control Panel -->
                <div class="absolute top-6 left-6 z-30 flex flex-col gap-3 w-[200px] md:w-[260px]">
                    <div class="text-brand-neon text-[10px] font-black uppercase tracking-widest px-1 drop-shadow-md flex items-center gap-2">
                        <i class="fa-solid fa-sliders"></i> TA Control Panel
                    </div>
                    
                    <!-- Animation Selection -->
                    <div class="hidden flex-col gap-2" id="anim-container">
                        <div class="relative">
                            <select id="anim-select" class="w-full bg-black/80 backdrop-blur-md border border-brand-neon/20 text-white text-[11px] font-bold px-3 py-2.5 rounded-xl shadow-lg outline-none appearance-none cursor-pointer hover:border-brand-neon/50 transition-all">
                            </select>
                            <i class="fa-solid fa-chevron-down absolute right-3 top-1/2 transform -translate-y-1/2 text-brand-neon/50 text-[10px] pointer-events-none"></i>
                        </div>
                        <button id="anim-play-btn" class="bg-black/80 backdrop-blur-md border border-brand-neon/30 text-brand-neon text-[11px] font-black px-2 py-2.5 rounded-xl shadow-lg hover:bg-brand-neon hover:text-black transition-all flex items-center justify-center gap-2 w-full opacity-50 pointer-events-none">
                            <i class="fa-solid fa-play"></i> 재생
                        </button>
                    </div>

                    <!-- Facial Control Toggle -->
                    <button id="facial-toggle-btn" class="bg-black/80 backdrop-blur-md border border-white/10 text-white text-[11px] font-bold px-2 py-2.5 rounded-xl shadow-lg hover:border-brand-neon/50 transition-all flex items-center justify-center gap-2 w-full">
                        <i class="fa-solid fa-face-smile-wink"></i> 페이셜 제어 (Facial)
                    </button>

                    <!-- Facial Sliders Panel (Scrollable) -->
                    <div id="facial-panel" class="hidden flex-col gap-4 bg-black/95 backdrop-blur-2xl border border-white/10 p-5 rounded-2xl shadow-2xl w-full max-h-[400px] overflow-y-auto custom-scrollbar overflow-x-hidden">
                        <div class="text-[10px] text-stone-400 font-black uppercase tracking-[0.2em] mb-1 border-b border-white/5 pb-2 flex justify-between">
                            <span>Morph Targets</span>
                            <span id="morph-count" class="text-brand-neon">0</span>
                        </div>
                        <div id="facial-sliders-list" class="flex flex-col gap-5">
                            <div class="text-[10px] text-stone-600 italic">모델 분석 중...</div>
                        </div>
                    </div>

                    <button id="rotate-btn" class="bg-brand-neon text-black text-[11px] font-black px-2 py-2.5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 w-full hover:bg-white">
                        <i class="fa-solid fa-rotate"></i> 턴테이블
                    </button>
                </div>

                <!-- Wireframe Toggle -->
                <div class="absolute top-6 right-6 z-20">
                    <button id="wireframe-btn" class="bg-black/80 backdrop-blur-md border border-brand-neon/50 text-brand-neon text-[11px] font-bold px-4 py-2.5 rounded-xl shadow-lg hover:bg-brand-neon hover:text-black transition-all flex items-center gap-2">
                        <i class="fa-solid fa-border-all"></i> 와이어프레임
                    </button>
                </div>

                <!-- Model Viewer -->
                <model-viewer 
                    id="main-viewer"
                    src="techwear.glb" 
                    alt="3D Character" 
                    auto-rotate 
                    camera-controls 
                    shadow-intensity="1" 
                    exposure="1"
                    environment-image="neutral"
                    class="w-full h-full outline-none"
                    style="--poster-color: transparent;"
                    data-lenis-prevent 
                    min-camera-orbit="auto auto 0.1m"
                    min-field-of-view="10deg"
                >
                </model-viewer>

                <!-- Poly Count -->
                <div class="absolute bottom-6 right-6 z-20">
                    <div class="bg-black/80 backdrop-blur-md border border-white/10 text-white text-[10px] font-bold px-4 py-2.5 rounded-xl shadow-lg flex flex-col items-end gap-1">
                        <span class="text-stone-500 uppercase tracking-widest text-[9px]">Triangles</span>
                        <span id="poly-count" class="text-brand-neon font-urbanist text-base tracking-wider">Calculating...</span>
                    </div>
                </div>

                <!-- Controls Info -->
                <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 flex gap-2 pointer-events-none w-max">
                    <div class="bg-black/60 backdrop-blur-md border border-white/10 text-white text-[10px] font-bold px-4 py-2 rounded-full shadow-lg flex items-center gap-2">
                        <i class="fa-solid fa-arrows-rotate text-brand-neon"></i> 좌클릭 회전
                    </div>
                    <div class="bg-black/60 backdrop-blur-md border border-white/10 text-white text-[10px] font-bold px-4 py-2 rounded-full shadow-lg hidden md:flex items-center gap-2">
                        <i class="fa-solid fa-hand text-brand-neon"></i> 우클릭 이동
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-20 px-6 text-center text-stone-600 text-[10px] font-bold uppercase tracking-widest border-t border-brand-border mt-20">
        <p>© 2026 KIM SUNG HO. Technical Artist Portfolio</p>
    </footer>

    <script>
        // 1. Smooth Scroll Init
        const lenis = new Lenis({ duration: 1.2, easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), smooth: true });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        const modelViewer = document.getElementById('main-viewer');

        // 2. 3D Viewer Global Fixes
        window.addEventListener('contextmenu', (e) => { e.preventDefault(); e.stopPropagation(); return false; }, { capture: true });
        if (modelViewer) {
            modelViewer.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });
            modelViewer.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
        }

        // 3. Main Logic
        modelViewer.addEventListener('load', () => {
            const symbols = Object.getOwnPropertySymbols(modelViewer);
            const sceneSymbol = symbols.find(s => s.description === 'scene');
            const scene = modelViewer[sceneSymbol];
            
            if (!scene) return;

            // --- 💡 [FIX 1] 강제 T-Pose 보장 로직 ---
            modelViewer.pause();
            modelViewer.currentTime = 0;
            // 모델 뷰어의 애니메이션 상태를 완전히 초기화하기 위해 강제 할당 후 제거
            modelViewer.animationName = "none_fallback"; 
            setTimeout(() => { modelViewer.removeAttribute('animation-name'); }, 50);

            // --- 💡 [FIX 2] 메쉬 뚫림 방지 및 데이터 추출 ---
            let totalTriangles = 0;
            const morphTargetsMap = new Map(); // Name -> Array of Meshes
            const uniqueMorphs = new Set();

            scene.traverse((node) => {
                if (node.isMesh) {
                    // 렌더링 퀄리티 수정 (매쉬 뚫림 해결)
                    if (node.material) {
                        node.material.side = 2; // Double Sided
                        node.material.depthWrite = true;
                        if (node.material.transparent) node.material.alphaTest = 0.5;
                        node.material.needsUpdate = true;
                    }

                    // 폴리곤 카운트 (와이어프레임 제외)
                    if (node.geometry && !node.userData.isWireframeOverlay) {
                        totalTriangles += (node.geometry.index ? node.geometry.index.count : node.geometry.attributes.position.count) / 3;
                    }

                    // 쉐이프키 데이터 수집
                    if (node.morphTargetDictionary) {
                        Object.keys(node.morphTargetDictionary).forEach((name) => {
                            if (!morphTargetsMap.has(name)) morphTargetsMap.set(name, []);
                            morphTargetsMap.get(name).push(node);
                            uniqueMorphs.add(name);
                        });
                    }
                }
            });

            // 업데이트 UI
            document.getElementById('poly-count').innerText = Math.round(totalTriangles).toLocaleString();
            document.getElementById('morph-count').innerText = uniqueMorphs.size;

            // --- 💡 [FIX 3] 페이셜 슬라이더 생성 ---
            const slidersList = document.getElementById('facial-sliders-list');
            slidersList.innerHTML = '';
            
            const sortedMorphs = Array.from(uniqueMorphs).sort();
            if (sortedMorphs.length === 0) {
                slidersList.innerHTML = '<div class="text-[10px] text-stone-600 italic">페이셜 데이터가 없습니다.</div>';
            } else {
                sortedMorphs.forEach((name) => {
                    const group = document.createElement('div');
                    group.className = 'flex flex-col gap-2 group';
                    group.innerHTML = `
                        <div class="flex justify-between items-center text-[9px] font-mono tracking-tight">
                            <span class="text-white/60 group-hover:text-white transition-colors">${name}</span>
                            <span class="text-brand-neon font-bold" id="val-${name}">0</span>
                        </div>
                        <input type="range" min="0" max="1" step="0.01" value="0" class="facial-slider" data-morph="${name}">
                    `;
                    slidersList.appendChild(group);

                    const slider = group.querySelector('input');
                    slider.addEventListener('input', (e) => {
                        const val = parseFloat(e.target.value);
                        document.getElementById(`val-${name}`).innerText = Math.round(val * 100);
                        // 해당 이름을 가진 모든 메쉬 동시 업데이트 (동기화)
                        morphTargetsMap.get(name).forEach(mesh => {
                            const idx = mesh.morphTargetDictionary[name];
                            mesh.morphTargetInfluences[idx] = val;
                        });
                    });
                });
            }

            // --- 🎬 애니메이션 제어부 ---
            const animContainer = document.getElementById('anim-container');
            const animSelect = document.getElementById('anim-select');
            const animPlayBtn = document.getElementById('anim-play-btn');
            let isPlaying = false;

            if (modelViewer.availableAnimations.length > 0) {
                animContainer.classList.replace('hidden', 'flex');
                animSelect.innerHTML = '<option value="none">🎬 동작: 기본 T-Pose (Rest)</option>';
                modelViewer.availableAnimations.forEach(a => {
                    const opt = document.createElement('option');
                    opt.value = a; opt.innerText = `🎬 동작: ${a}`;
                    animSelect.appendChild(opt);
                });

                animSelect.addEventListener('change', (e) => {
                    if (e.target.value === 'none') {
                        modelViewer.removeAttribute('animation-name');
                        modelViewer.pause();
                        modelViewer.currentTime = 0;
                        isPlaying = false;
                        animPlayBtn.classList.add('opacity-50', 'pointer-events-none');
                    } else {
                        modelViewer.animationName = e.target.value;
                        modelViewer.play();
                        isPlaying = true;
                        animPlayBtn.classList.remove('opacity-50', 'pointer-events-none');
                        animPlayBtn.innerHTML = '<i class="fa-solid fa-pause"></i> 일시정지';
                    }
                });

                animPlayBtn.addEventListener('click', () => {
                    if (isPlaying) { modelViewer.pause(); animPlayBtn.innerHTML = '<i class="fa-solid fa-play"></i> 재생'; }
                    else { modelViewer.play(); animPlayBtn.innerHTML = '<i class="fa-solid fa-pause"></i> 일시정지'; }
                    isPlaying = !isPlaying;
                });
            }
        });

        // 4. UI Toggle Buttons
        const facialToggleBtn = document.getElementById('facial-toggle-btn');
        const facialPanel = document.getElementById('facial-panel');
        facialToggleBtn.addEventListener('click', () => {
            facialPanel.classList.toggle('hidden');
            facialPanel.classList.toggle('flex');
        });

        const rotateBtn = document.getElementById('rotate-btn');
        rotateBtn.addEventListener('click', () => {
            modelViewer.autoRotate = !modelViewer.autoRotate;
            rotateBtn.classList.toggle('bg-brand-neon'); rotateBtn.classList.toggle('text-black');
            rotateBtn.classList.toggle('bg-black/80'); rotateBtn.classList.toggle('text-white');
            rotateBtn.innerHTML = modelViewer.autoRotate ? '<i class="fa-solid fa-rotate"></i> 턴테이블' : '<i class="fa-solid fa-pause"></i> 정지됨';
        });

        // 5. Wireframe Overlay Logic
        const wireframeBtn = document.getElementById('wireframe-btn');
        let isWireframe = false;
        wireframeBtn.addEventListener('click', () => {
            isWireframe = !isWireframe;
            const symbols = Object.getOwnPropertySymbols(modelViewer);
            const scene = modelViewer[symbols.find(s => s.description === 'scene')];
            
            scene.traverse((node) => {
                if (node.isMesh && !node.userData.isWireframeOverlay) {
                    let wfClone = node.children.find(c => c.userData.isWireframeOverlay);
                    if (!wfClone) {
                        wfClone = node.clone(); wfClone.children = [];
                        if (node.isSkinnedMesh) wfClone.bind(node.skeleton, node.bindMatrix);
                        wfClone.material = node.material.clone();
                        wfClone.material.wireframe = true; wfClone.material.transparent = true; wfClone.material.opacity = 0.8;
                        wfClone.material.map = wfClone.material.normalMap = wfClone.material.roughnessMap = wfClone.material.metalnessMap = wfClone.material.emissiveMap = null;
                        wfClone.material.polygonOffset = true; wfClone.material.polygonOffsetFactor = -4; wfClone.material.polygonOffsetUnits = -4;
                        wfClone.material.color.set('#ffffff'); wfClone.material.emissive.set('#ffffff'); wfClone.material.emissiveIntensity = 1.0;
                        wfClone.userData.isWireframeOverlay = true; node.add(wfClone);
                    }
                    wfClone.visible = isWireframe;
                }
            });
            if (isWireframe) { wireframeBtn.classList.replace('bg-black/80', 'bg-brand-neon'); wireframeBtn.classList.replace('text-brand-neon', 'text-black'); }
            else { wireframeBtn.classList.replace('bg-brand-neon', 'bg-black/80'); wireframeBtn.classList.replace('text-black', 'text-brand-neon'); }
        });

        // 6. Custom Cursor
        const cursorDot = document.getElementById('cursor-dot');
        const cursorOutline = document.getElementById('cursor-outline');
        window.addEventListener('mousemove', (e) => {
            const isTouchDevice = () => window.matchMedia("(pointer: coarse)").matches;
            if (isTouchDevice()) return;
            gsap.to(cursorDot, { x: e.clientX, y: e.clientY, duration: 0 });
            gsap.to(cursorOutline, { x: e.clientX, y: e.clientY, duration: 0.5, ease: 'power3.out' });
        });
    </script>
</body>
</html>
